<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Lookup </title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Consolas", "Courier New", monospace;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0.92)),
        url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      color: #00ff88;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 35px 35px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(0, 10, 8, 0.82);
      border: 1px solid rgba(0, 255, 136, 0.35);
      box-shadow:
        0 0 35px rgba(0, 255, 136, 0.18),
        inset 0 0 30px rgba(0, 255, 136, 0.04);
      border-radius: 22px;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 15px 18px;
      background: rgba(0, 255, 136, 0.08);
      border-bottom: 1px solid rgba(0, 255, 136, 0.25);
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }

    .red { background: #ff4b4b; }
    .yellow { background: #ffcc33; }
    .green { background: #00ff88; }

    .top-title {
      margin-left: 12px;
      color: #d8fff0;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .content {
      padding: 35px;
    }

    h1 {
      font-size: clamp(30px, 5vw, 54px);
      color: #ffffff;
      text-shadow: 0 0 18px rgba(0, 255, 136, 0.6);
      margin-bottom: 10px;
    }

    .subtitle {
      color: #9affcf;
      margin-bottom: 30px;
      line-height: 1.6;
      font-size: 15px;
    }

    .warning {
      color: #ffcc33;
      font-size: 13px;
      margin-bottom: 22px;
      opacity: 0.9;
    }

    .input-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 28px;
    }

    input {
      width: 100%;
      padding: 17px 18px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0, 255, 136, 0.4);
      color: #00ff88;
      outline: none;
      border-radius: 14px;
      font-size: 16px;
      box-shadow: inset 0 0 15px rgba(0,255,136,0.05);
    }

    input::placeholder {
      color: rgba(0, 255, 136, 0.45);
    }

    button {
      padding: 0 24px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ff88, #00bfff);
      color: #00110a;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 1px;
      transition: 0.25s;
      box-shadow: 0 0 22px rgba(0, 255, 136, 0.35);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 35px rgba(0, 255, 136, 0.65);
    }

    .terminal {
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid rgba(0, 255, 136, 0.25);
      border-radius: 16px;
      padding: 20px;
      min-height: 300px;
      max-height: 440px;
      overflow-y: auto;
      box-shadow: inset 0 0 30px rgba(0, 255, 136, 0.05);
    }

    .line {
      margin-bottom: 9px;
      font-size: 14px;
      color: #00ff88;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
      word-break: break-word;
    }

    .line span {
      color: #ffffff;
    }

    .success {
      color: #7dffb2;
    }

    .error {
      color: #ff5f5f;
    }

    .info {
      color: #00d9ff;
    }

    .final-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 15px;
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.3);
      display: none;
      animation: pop 0.4s ease;
    }

    .final-box h2 {
      color: #ffffff;
      margin-bottom: 12px;
      font-size: 22px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .result-item {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,255,136,0.18);
      padding: 13px;
      border-radius: 12px;
    }

    .result-item small {
      display: block;
      color: #7dffb2;
      margin-bottom: 5px;
      opacity: 0.8;
    }

    .result-item strong {
      color: white;
      font-size: 16px;
    }

    .fake-label {
      margin-top: 15px;
      font-size: 12px;
      color: #ffcc33;
      opacity: 0.9;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 700px) {
      .input-box {
        grid-template-columns: 1fr;
      }

      button {
        padding: 16px;
      }

      .content {
        padding: 24px;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <div class="topbar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="top-title">secure-terminal / dc-lookup-</div>
      </div>

      <div class="content">
        <h1>DC LOOKUP</h1>
        <p class="subtitle">
       Write egy Discord usher, and acrte.
        </p>

        <p class="warning">
        Warning its local
        </p>

        <div class="input-box">
          <input id="dcInput" type="text" placeholder="dc: usher" />
          <button onclick="startLookup()">SCAN</button>
        </div>

        <div class="terminal" id="terminal">
          <div class="line info">[SYSTEM] Várakozás Discord névre...</div>
          <div class="line">[READY] Lookup modul betöltve.</div>
        </div>

        <div class="final-box" id="finalBox">
          <h2>Találat generálva</h2>

          <div class="result-grid">
            <div class="result-item">
              <small>Discord név</small>
              <strong id="resName">-</strong>
            </div>

            <div class="result-item">
              <small>Szolgáltató</small>
              <strong id="resProvider">-</strong>
            </div>

            <div class="result-item">
              <small> IP cím</small>
              <strong id="resIp">-</strong>
            </div>

            <div class="result-item">
              <small>Státusz</small>
              <strong>Active</strong>
            </div>
          </div>

          <div class="fake-label">
            Adat feldolgozva
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const providers = [
      "Telekom",
      "Yettel",
      "Vodafone",
      "Netfone",
      "Digi Mobil",
      "Telenor Legacy",
      "Invitech Network"
    ];

    const steps = [
      "[INIT] Kapcsolódás a lookup gatewayhez...",
      "[AUTH] Ideiglenes session token létrehozása...",
      "[SCAN] Discord azonosító elemzése...",
      "[TRACE] Publikus node-ok vizsgálata...",
      "[ROUTE] Hálózati útvonalak szimulálása...",
      "[PACKET] Csomagminták ellenőrzése...",
      "[DNS] Kamu DNS rekordok betöltése...",
      "[ISP] Szolgáltató becslése...",
      "[IP] Véletlenszerű IP cím generálása...",
      "[VERIFY] Adatok formázása...",
      "[DONE] Szimuláció befejezve."
    ];

    function randomProvider() {
      return providers[Math.floor(Math.random() * providers.length)];
    }

    function randomIp() {
      return `${rand(11, 223)}.${rand(0, 255)}.${rand(0, 255)}.${rand(1, 254)}`;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function addLine(text, className = "") {
      const terminal = document.getElementById("terminal");
      const div = document.createElement("div");
      div.className = `line ${className}`;
      div.textContent = text;
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function clearTerminal() {
      document.getElementById("terminal").innerHTML = "";
    }

    function startLookup() {
      const input = document.getElementById("dcInput");
      const name = input.value.trim();

      if (!name) {
        clearTerminal();
        addLine("[ERROR] Először írj be egy Discord nevet.", "error");
        return;
      }

      const provider = randomProvider();
      const ip = randomIp();

      document.getElementById("finalBox").style.display = "none";
      clearTerminal();

      addLine(`[TARGET] dc: ${name}`, "info");

      let index = 0;

      const interval = setInterval(() => {
        if (index < steps.length) {
          addLine(steps[index]);

          if (index === 3) {
            addLine(`[NODE] Aktív node: HU-${rand(100, 999)}-${rand(10, 99)}`, "info");
          }

          if (index === 5) {
            addLine(`[PACKET] ${rand(1200, 9800)} feldolgozva`, "info");
          }

          if (index === 7) {
            addLine(`[ISP]  szolgáltató: ${provider}`, "success");
          }

          if (index === 8) {
            addLine(`[IP]  cím: ${ip}`, "success");
          }

          index++;
        } else {
          clearInterval(interval);

          addLine("[SUCCESS] Kamu adatlap elkészült.", "success");

          document.getElementById("resName").textContent = name;
          document.getElementById("resProvider").textContent = provider;
          document.getElementById("resIp").textContent = ip;
          document.getElementById("finalBox").style.display = "block";
        }
      }, 550);
    }

    document.getElementById("dcInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        startLookup();
      }
    });
  </script>
</body>
</html>
